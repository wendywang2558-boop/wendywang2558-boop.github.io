<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORTIS | New Wave Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f4f1ea;
    --text-color: #2b2624;
    --accent-green: #00ff41;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
}

/* 封面 */
.hero {
    position: relative;
    height: 90vh;
    background: url("Cortis.png") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.hero-text {
    position: relative;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 4rem;
    letter-spacing: 6px;
}

.hero p {
    color: var(--accent-green);
    font-weight: bold;
}

/* 導航 */
nav {
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
}

/* 內容 */
main {
    max-width: 800px;
    margin: auto;
    padding: 2rem;
}

.lyric-section {
    background: white;
    padding: 2.5rem;
    border-radius: 15px;
    margin-top: -80px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.korean {
    font-weight: bold;
}

.chinese {
    color: gray;
    font-size: 0.9rem;
}

.highlight {
    color: var(--accent-green);
    text-shadow: 0 0 10px var(--accent-green);
}

.chorus {
    text-align: center;
    margin: 2rem 0;
    padding: 1.5rem;
    border: 2px solid var(--text-color);
}

/* AI說明區 */
.ai-section {
    margin-top: 3rem;
    padding: 2rem;
    background: #fafafa;
    border-left: 5px solid var(--accent-green);
}

/* 動畫 */
.new-shit-badge {
    display: inline-block;
    margin-top: 2rem;
    border: 2px solid var(--text-color);
    padding: 1rem 2rem;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

/* 手機 */
@media (max-width:600px){
    .hero h1 {font-size: 2.5rem;}
}
</style>
</head>

<body>

<nav>
    <div>CORTIS</div>
    <div>2026</div>
</nav>

<!-- 封面 -->
<section class="hero">
    <div class="hero-text">
        <h1>NEW WAVE</h1>
        <p>PAINT THE TOWN, 초록색의 LIGHTS</p>
    </div>
</section>

<main>

<!-- 歌詞 -->
<section class="lyric-section">

    <div>
        <span class="korean">가져와 new beat / 가져와 new hit</span><br>
        <span class="chinese">帶來新的節拍 / 帶來新的熱門曲</span>
    </div>

    <div class="chorus">
        I just gotta get it<br>
        Watch me go go go
    </div>

</section>

</main>

<footer style="text-align:center; padding:3rem;">
    © 2026 CORTIS
</footer>

</body>
</html>
